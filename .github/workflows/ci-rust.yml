name: CI — Rust CLI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "cli/**"
      - "templates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "cli/**"
      - "templates/**"
      - "Cargo.toml"

jobs:
  check:
    name: Check / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --package borgkit-cli -- --check

      - name: cargo clippy
        run: cargo clippy --package borgkit-cli -- -D warnings

      - name: cargo test
        run: cargo test --package borgkit-cli

      - name: cargo build (release, host target)
        run: cargo build --release --package borgkit-cli
