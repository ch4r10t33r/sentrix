name: Release CLI

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:   # allow release.yml to trigger this after semantic-release

permissions:
  contents: write   # create GitHub releases
  id-token: write   # npm provenance

jobs:
  # ── Build one binary per target ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.npm_pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:    x86_64-unknown-linux-gnu
            os:        ubuntu-latest
            use_cross: true
            npm_pkg:   inai-cli-linux-x64
            bin_name:  inai

          - target:    aarch64-unknown-linux-gnu
            os:        ubuntu-latest
            use_cross: true
            npm_pkg:   inai-cli-linux-arm64
            bin_name:  inai

          - target:    x86_64-apple-darwin
            os:        macos-15-intel
            use_cross: false
            npm_pkg:   inai-cli-darwin-x64
            bin_name:  inai

          - target:    aarch64-apple-darwin
            os:        macos-latest
            use_cross: false
            npm_pkg:   inai-cli-darwin-arm64
            bin_name:  inai

          - target:    x86_64-pc-windows-msvc
            os:        windows-latest
            use_cross: false
            npm_pkg:   inai-cli-win32-x64
            bin_name:  inai.exe

    steps:
      - uses: actions/checkout@v4

      - name: Sync Cargo.toml version from package.json
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i.bak "s/^version *= *\"[^\"]*\"/version     = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Synced Cargo.toml workspace version to $VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package inai-cli

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --package inai-cli

      - name: Install binutils for Linux cross strip
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils-aarch64-linux-gnu

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.bin_name }}"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip "$bin"
          else
            strip "$bin"
          fi

      - name: Copy binary into npm package
        shell: bash
        run: |
          mkdir -p "npm/${{ matrix.npm_pkg }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" \
            "npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin_name }}"
          chmod +x "npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin_name }}" 2>/dev/null || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin_name }}
          if-no-files-found: error

  # ── Publish GitHub release + all npm packages ───────────────────────────────
  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Place binaries into npm packages
        shell: bash
        run: |
          declare -A MAP=(
            [binary-inai-cli-linux-x64]=inai-cli-linux-x64
            [binary-inai-cli-linux-arm64]=inai-cli-linux-arm64
            [binary-inai-cli-darwin-x64]=inai-cli-darwin-x64
            [binary-inai-cli-darwin-arm64]=inai-cli-darwin-arm64
            [binary-inai-cli-win32-x64]=inai-cli-win32-x64
          )
          for artifact in "${!MAP[@]}"; do
            pkg="${MAP[$artifact]}"
            src="artifacts/$artifact"
            dst="npm/$pkg/bin"
            mkdir -p "$dst"
            cp "$src"/* "$dst/"
            chmod +x "$dst"/* 2>/dev/null || true
          done

      - name: Write version into all package.json files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in npm/inai-cli npm/inai-cli-linux-x64 npm/inai-cli-linux-arm64 \
                     npm/inai-cli-darwin-x64 npm/inai-cli-darwin-arm64 npm/inai-cli-win32-x64; do
            jq --arg v "$VERSION" '.version = $v' "$pkg/package.json" > /tmp/pkg.json
            mv /tmp/pkg.json "$pkg/package.json"
          done
          # Update optionalDependency versions in wrapper
          jq --arg v "$VERSION" \
            '.optionalDependencies |= with_entries(.value = $v)' \
            npm/inai-cli/package.json > /tmp/pkg.json
          mv /tmp/pkg.json npm/inai-cli/package.json

      - name: Copy README into wrapper package
        run: cp README.md npm/inai-cli/README.md

      - name: Stage release binaries with platform names
        shell: bash
        run: |
          mkdir -p dist/
          cp npm/inai-cli-linux-x64/bin/inai    dist/inai-linux-x64
          cp npm/inai-cli-linux-arm64/bin/inai  dist/inai-linux-arm64
          cp npm/inai-cli-darwin-x64/bin/inai   dist/inai-darwin-x64
          cp npm/inai-cli-darwin-arm64/bin/inai dist/inai-darwin-arm64
          cp npm/inai-cli-win32-x64/bin/inai.exe dist/inai-win32-x64.exe

      - name: Create or refresh GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          FILES=(
            dist/inai-linux-x64
            dist/inai-linux-arm64
            dist/inai-darwin-x64
            dist/inai-darwin-arm64
            dist/inai-win32-x64.exe
            install.sh
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists (retry / partial run); replacing assets"
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${FILES[@]}"
          fi

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in inai-cli-linux-x64 inai-cli-linux-arm64 \
                     inai-cli-darwin-x64 inai-cli-darwin-arm64 \
                     inai-cli-win32-x64; do
            cd npm/$pkg
            if npm view "@ch4r10teer41/$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "@ch4r10teer41/$pkg@$VERSION already published — skipping"
            else
              npm publish --access public
              sleep 5
            fi
            cd ../..
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@ch4r10teer41/inai-cli@$VERSION" version >/dev/null 2>&1; then
            echo "@ch4r10teer41/inai-cli@$VERSION already published — skipping"
          else
            cd npm/inai-cli
            npm publish --access public
          fi
